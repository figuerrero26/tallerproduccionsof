services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fundacion
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db:3306/fundacion
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8000"
    # AÑADE ESTO: Para que los cambios en Python se recarguen solos
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    # MODIFICA ESTO:
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # AÑADE ESTO: A veces Docker en Windows/Mac necesita "polling" para detectar cambios
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  db_data:
